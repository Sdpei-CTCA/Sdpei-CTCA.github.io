<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玩机社 APP 官方下载与演示</title>
    <!-- 引入 Tailwind CSS 快速搭建样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 简单的一些动画效果 */
        .fade-in-up {
            animation: fadeInUp 1s ease-out forwards;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased overflow-x-hidden">

    <!-- 导航栏 -->
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <span class="text-xl font-bold text-indigo-600">Sdpei CTCA APP</span>
                    </div>
                </div>
                <div class="flex items-center">
                    <a href="/" class="text-gray-500 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">返回博客首页</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 头部横幅与核心内容区 -->
    <main class="mt-16 mx-auto max-w-7xl px-4 sm:mt-24 sm:px-6 lg:mt-32">
        <div class="lg:grid lg:grid-cols-12 lg:gap-8">
            <!-- 文字介绍 -->
            <div class="sm:text-center md:max-w-2xl md:mx-auto lg:col-span-6 lg:text-left fade-in-up">
                <h1>
                    <span class="block text-sm font-semibold uppercase tracking-wide text-indigo-500">全新版本现已发布</span>
                    <span class="mt-1 block text-4xl tracking-tight font-extrabold sm:text-5xl xl:text-6xl">
                        <span class="block text-gray-900">随时随地掌握</span>
                        <span class="block text-indigo-600">最新玩机资讯</span>
                    </span>
                </h1>
                <p class="mt-3 text-base text-gray-500 sm:mt-5 sm:text-lg sm:max-w-xl sm:mx-auto md:mt-5 md:text-xl lg:mx-0">
                    专为山东体育学院计算机社团（玩机社）打造的全能助手。集合了电脑维修预约、校园网配置指南、二手电子市场以及最新极客资讯。
                </p>
                <!-- 下载按钮等操作区 -->
                <div class="mt-8 sm:max-w-lg sm:mx-auto sm:text-center lg:text-left lg:mx-0">
                    <div class="flex flex-col sm:flex-row sm:justify-center lg:justify-start gap-4">
                        <a href="#download" class="inline-flex justify-center items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700">
                            立即下载 Android 版
                        </a>
                        <a href="#ios" class="inline-flex justify-center items-center px-6 py-3 border border-gray-300 shadow-sm text-base font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                            了解 iOS 进展
                        </a>
                    </div>
                </div>
            </div>
            
            <!-- 手机效果演示图区块 -->
            <div class="mt-12 relative sm:max-w-lg sm:mx-auto lg:mt-0 lg:max-w-none lg:mx-0 lg:col-span-6 lg:flex lg:items-center fade-in-up" style="animation-delay: 0.2s;">
                <div class="relative mx-auto w-full rounded-lg shadow-lg lg:max-w-md bg-gray-800 p-2 border-4 border-gray-900 flex justify-center text-center" style="height: 600px; border-radius: 40px;">
                    <!-- 模拟手机屏幕里面的内容，你可以自行替换为实际的截图 <img> -->
                    <div class="bg-white w-full h-full rounded-[30px] overflow-hidden flex flex-col pt-10">
                        <h2 class="text-2xl font-bold text-gray-800 mb-8">APP 首页演示区</h2>
                        <div class="flex-1 bg-gray-100 flex items-center justify-center m-4 rounded-xl border-2 border-dashed border-gray-300">
                            <span class="text-gray-400">此处可放你的 App 截图 <br> (img/app-screenshot.png)</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-white mt-24 border-t border-gray-200">
        <div class="max-w-7xl mx-auto py-12 px-4 sm:px-6 md:flex md:items-center md:justify-between lg:px-8">
            <div class="mt-8 md:mt-0 md:order-1 flex justify-center text-gray-400">
                <p class="text-base text-gray-400">
                    &copy; 2026 山东体育学院玩机社 (Sdpei-CTCA). 保留所有权利.
                </p>
            </div>
        </div>
    </footer>

</body>
</html>
